app-id: io.github.dantavares.F3Gui
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.python3.11

command: f3-gui

finish-args:
  # Acesso a dispositivos de bloco (pendrives, cartões SD)
  - --device=all
  # Acesso ao sistema de arquivos do host (para montar/desmontar)
  - --filesystem=host
  # Janela gráfica
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  # Necessário para lsblk e comandos do host
  - --talk-name=org.freedesktop.Flatpak

modules:

  # ── f3 compilado a partir do código-fonte ──────────────────────────────────
  - name: f3
    buildsystem: simple
    build-commands:
      - make
      - make install PREFIX=/app
    sources:
      - type: git
        url: https://github.com/AltraMayor/f3.git
        tag: v8.0
        commit: COLOQUE_O_COMMIT_HASH_AQUI

  # ── Aplicação Python ───────────────────────────────────────────────────────
  - name: f3-gui
    buildsystem: simple
    build-commands:
      - install -Dm755 f3_gui.py       /app/bin/f3-gui-script
      - install -Dm755 f3-gui-wrapper  /app/bin/f3-gui
      - install -Dm644 io.github.dantavares.F3Gui.desktop
            /app/share/applications/io.github.dantavares.F3Gui.desktop
      - install -Dm644 io.github.dantavares.F3Gui.metainfo.xml
            /app/share/metainfo/io.github.dantavares.F3Gui.metainfo.xml
      - install -Dm644 io.github.dantavares.F3Gui.svg
            /app/share/icons/hicolor/scalable/apps/io.github.dantavares.F3Gui.svg
    sources:
      - type: file
        path: f3_gui.py
      - type: file
        path: f3-gui-wrapper
      - type: file
        path: io.github.dantavares.F3Gui.desktop
      - type: file
        path: io.github.dantavares.F3Gui.metainfo.xml
      - type: file
        path: io.github.dantavares.F3Gui.svg
