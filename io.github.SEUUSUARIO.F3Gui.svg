<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0e1117"/>
      <stop offset="100%" stop-color="#1e2535"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#0099ff"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Borda sutil -->
  <rect width="126" height="126" x="1" y="1" rx="23"
        fill="none" stroke="#2a3347" stroke-width="2"/>

  <!-- Corpo do pen drive -->
  <rect x="38" y="52" width="52" height="36" rx="6"
        fill="#1e2535" stroke="#2a3347" stroke-width="2"/>

  <!-- Conector USB -->
  <rect x="80" y="61" width="18" height="18" rx="3"
        fill="#2a3347"/>
  <rect x="83" y="64" width="12" height="12" rx="2"
        fill="#0e1117"/>

  <!-- LED de status -->
  <circle cx="52" cy="70" r="5" fill="#00d4aa" opacity="0.9"/>
  <circle cx="52" cy="70" r="3" fill="#00ffcc"/>

  <!-- Raio / ⚡ -->
  <polygon points="70,28 58,58 66,58 56,88 80,52 70,52"
           fill="url(#bolt)" opacity="0.95"/>

  <!-- Linha de acento inferior -->
  <rect x="24" y="118" width="80" height="3" rx="1.5"
        fill="#00d4aa" opacity="0.7"/>
</svg>
